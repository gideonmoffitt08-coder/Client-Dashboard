name: Site Health Monitor

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Check Client Sites & Send Alerts
        env:
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM_NUMBER: ${{ secrets.TWILIO_FROM_NUMBER }}
          ALERT_TO_NUMBER: ${{ secrets.ALERT_TO_NUMBER }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, urllib.parse, urllib.error
          import json, os, time, ssl, base64

          SITES = [
            {"name": "Honduras 504", "url": "https://gideonmoffitt08-coder.github.io/Honduras-504-/"},
            {"name": "Blessed Fit Zone", "url": "https://gideonmoffitt08-coder.github.io/Blessed-Fit-Zone/"},
          ]

          ACCOUNT_SID = os.environ.get("TWILIO_ACCOUNT_SID", "")
          AUTH_TOKEN = os.environ.get("TWILIO_AUTH_TOKEN", "")
          FROM_NUMBER = os.environ.get("TWILIO_FROM_NUMBER", "")
          TO_NUMBER = os.environ.get("ALERT_TO_NUMBER", "")

          def send_sms(message):
            if not all([ACCOUNT_SID, AUTH_TOKEN, FROM_NUMBER, TO_NUMBER]):
              print("Twilio credentials missing")
              return
            try:
              url = f"https://api.twilio.com/2010-04-01/Accounts/{ACCOUNT_SID}/Messages.json"
              data = urllib.parse.urlencode({"From": FROM_NUMBER, "To": TO_NUMBER, "Body": message}).encode()
              creds = base64.b64encode(f"{ACCOUNT_SID}:{AUTH_TOKEN}".encode()).decode()
              req = urllib.request.Request(url, data=data, headers={"Authorization": f"Basic {creds}", "Content-Type": "application/x-www-form-urlencoded"})
              with urllib.request.urlopen(req, timeout=15) as res:
                print(f"SMS sent: {res.status}")
            except Exception as e:
              print(f"SMS failed: {e}")

          def check_site(site):
            url = site["url"]
            result = {"name": site["name"], "url": url, "online": False, "ssl": url.startswith("https://"), "load_time_ms": None, "has_title": False, "has_meta_desc": False, "has_viewport": False, "issues": [], "health_score": 0}
            start = time.time()
            try:
              ctx = ssl.create_default_context()
              req = urllib.request.Request(url, headers={"User-Agent": "YWV-Monitor/1.0"})
              with urllib.request.urlopen(req, timeout=15, context=ctx) as res:
                load_time = int((time.time() - start) * 1000)
                result["online"] = True
                result["load_time_ms"] = load_time
                html = res.read().decode("utf-8", errors="ignore").lower()
                result["has_title"] = "<title>" in html
                result["has_meta_desc"] = 'name="description"' in html
                result["has_viewport"] = 'name="viewport"' in html
                if not result["ssl"]: result["issues"].append("No SSL")
                if not result["has_title"]: result["issues"].append("Missing title")
                if not result["has_meta_desc"]: result["issues"].append("Missing meta description")
                if not result["has_viewport"]: result["issues"].append("Missing mobile viewport")
                if load_time > 5000: result["issues"].append(f"Very slow: {load_time}ms")
                elif load_time > 3000: result["issues"].append(f"Slow: {load_time}ms")
            except Exception as e:
              result["issues"].append(f"Unreachable: {str(e)[:50]}")
            checks = [result["online"], result["ssl"], result["has_title"], result["has_meta_desc"], result["has_viewport"], result["load_time_ms"] is not None and result["load_time_ms"] < 3000]
            result["health_score"] = round(sum(1 for c in checks if c) / len(checks) * 100)
            return result

          print("Yellow Wall Ventures — Site Monitor")
          alerts = []
          for site in SITES:
            print(f"Checking: {site['name']}")
            result = check_site(site)
            print(f"  Health: {result['health_score']}% | Online: {result['online']}")
            if result["issues"]: print(f"  Issues: {', '.join(result['issues'])}")
            if not result["online"]:
              alerts.append(f"🔴 SITE DOWN: {site['name']} is unreachable.\nIssues: {', '.join(result['issues'])}")
            elif result["health_score"] < 50:
              alerts.append(f"⚠️ LOW HEALTH: {site['name']} scored {result['health_score']}%.\nIssues: {', '.join(result['issues'])}")

          if alerts:
            for alert in alerts:
              send_sms(f"YWV Monitor\n{alert}\n\nCheck your dashboard.")
              time.sleep(1)
            print(f"{len(alerts)} alert(s) sent.")
          else:
            print("All sites healthy — no alerts needed.")
          PYEOF
